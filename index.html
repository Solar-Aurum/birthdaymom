<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mom ❤️</title>

<style>
body {
    margin: 0;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Comic Sans MS', cursive;

    background: linear-gradient(135deg, #f6d365, #fda085, #fbc2eb);

    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
}

#cake {
    font-size: clamp(90px, 25vw, 160px);
    cursor: pointer;
    transition: transform 0.1s, filter 0.3s;
    filter: drop-shadow(0 8px 15px rgba(0,0,0,0.2));
    animation: bounce 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
}

#cake:active {
    transform: scale(0.9) translateY(0);
}

.piece {
    position: absolute;
    font-size: clamp(18px, 4vw, 28px);
    pointer-events: none;
    animation: explode 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30% { transform: translateY(-12px); }
    60% { transform: translateY(-6px); }
}

@keyframes explode {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    70% { opacity: 1; }
    100% {
        transform: translate(var(--x), var(--y)) scale(0.7);
        opacity: 0;
    }
}

#message {
    display: none;
    margin-top: 30px;
    color: #fff;
    max-width: 500px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

.handwriting {
    font-size: clamp(30px, 7vw, 52px);
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    width: 0;
    margin: 0 auto;
    animation: typing 3s steps(25, end) forwards, blink 0.7s infinite;
}

.subtext {
    margin-top: 20px;
    font-size: clamp(16px, 4vw, 22px);
    opacity: 0;
    animation: fadeIn 2s ease forwards;
    animation-delay: 3s;
}

#locked {
    display: none;
    color: #fff;
    font-size: 24px;
    text-shadow: 0 4px 15px rgba(0,0,0,0.25);
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>

<body>

<div id="locked">🎁 Come back on April 10 🎁</div>

<div id="cake">🎂</div>

<div id="message">
    <div class="handwriting">Happy Birthday Mom ❤️</div>
    <div class="subtext">I love you, I wish you so much happiness and an amazing year!</div>
</div>

<script>
let clicks = 0;

const today = new Date();
const isApril10 = (today.getMonth() === 3 && today.getDate() === 10);

const cake = document.getElementById("cake");
const message = document.getElementById("message");
const locked = document.getElementById("locked");

/* LOCK SYSTEM */
if (!isApril10) {
    cake.style.display = "none";
    locked.style.display = "block";
}

/* CLICK SYSTEM */
cake.addEventListener("click", () => {
    clicks++;
    explodeCake();

    if (clicks >= 5) {
        cake.style.display = "none";
        message.style.display = "block";
        cheer();
    }
});

/* EXPLOSION */
function explodeCake() {
    const maxDistance = Math.max(window.innerWidth, window.innerHeight);
    const count = Math.floor((window.innerWidth * window.innerHeight) / 12000);

    for (let i = 0; i < count; i++) {
        let piece = document.createElement("div");
        piece.className = "piece";
        piece.innerHTML = "🍰";

        let angle = Math.random() * 2 * Math.PI;
        let distance = maxDistance * (0.6 + Math.random() * 0.5);

        let x = Math.cos(angle) * distance;
        let y = Math.sin(angle) * distance;

        piece.style.setProperty('--x', x + "px");
        piece.style.setProperty('--y', y + "px");

        piece.style.left = (window.innerWidth / 2) + "px";
        piece.style.top = (window.innerHeight / 2) + "px";

        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2000);
    }
}

/* FINAL CELEBRATION */
function cheer() {
    for (let i = 0; i < 120; i++) {
        let confetti = document.createElement("div");
        confetti.className = "piece";
        confetti.innerHTML = ["🎉","✨","💖","🎊"][Math.floor(Math.random()*4)];

        let angle = Math.random() * 2 * Math.PI;
        let distance = Math.max(window.innerWidth, window.innerHeight);

        confetti.style.setProperty('--x', Math.cos(angle)*distance + "px");
        confetti.style.setProperty('--y', Math.sin(angle)*distance + "px");

        confetti.style.left = (window.innerWidth / 2) + "px";
        confetti.style.top = (window.innerHeight / 2) + "px";

        document.body.appendChild(confetti);
        setTimeout(() => confetti.remove(), 2200);
    }

    let audio = new Audio("https://www.soundjay.com/human/applause-8.mp3");
    audio.play().catch(() => {});
}
</script>

</body>
</html>
